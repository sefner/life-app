<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1411" />
  <title>Life</title>

  <!-- iOS "Add to Home Screen" -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Life" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="core/styles.css" />
</head>
<body>
  <header id="appbar">
    <button id="backBtn" class="iconbtn" hidden aria-label="Back">‹</button>
    <h1 id="appTitle">Life</h1>
    <div id="appDate"></div>
  </header>

  <main id="root"></main>

  <div id="toast" class="toast" hidden></div>

  <!-- Core (load order matters: store -> app, then modules, then boot) -->
  <script src="core/store.js"></script>
  <script src="core/app.js"></script>

  <!-- Modules: add a file here and it shows up. That's the whole "framework". -->
  <script src="modules/training.js"></script>
  <script src="modules/nutrition.js"></script>
  <script src="modules/body.js"></script>
  <script src="modules/supplements.js"></script>
  <script src="modules/reminders.js"></script>

  <script>
    App.start();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
